<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Visualizer</title>
    <link rel="stylesheet" href="wow_peace.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-theme">
    <!-- TOP RIGHT TAB (10% height, 80% width) -->
    <header class="top-tab">
        <div class="year-controls">
            <button id="fromMinus" class="arrow-btn">-</button>
            <span id="fromYear">2020</span>
            <span> → </span>
            <span id="untilYear">2023</span>
            <button id="untilPlus" class="arrow-btn">+</button>
        </div>
        <button id="lawVisualizer" class="law-btn">Law Visualizer</button>
        <button id="themeToggle" class="theme-btn">🌙</button>
        <button id="settings" class="settings-btn">⚙️</button>
    </header>

    <!-- LEFT TAB (100% height, 20% width) -->
    <aside class="left-tab">
        <h3>📊 Statistics</h3>
        <ul id="statsList">
            <li data-type="gdp">💰 GDP Growth</li>
            <li data-type="population">👥 Population</li>
            <li data-type="inflation">📈 Inflation</li>
            <li data-type="unemployment">👷 Unemployment</li>
        </ul>
    </aside>

    <!-- CENTER RIGHT TAB (60% height, 80% width) -->
    <main class="center-tab">
        <canvas id="mainChart"></canvas>
    </main>

    <!-- BOTTOM RIGHT TAB (30% height, 80% width) -->
    <footer class="bottom-tab">
        <h4>📚 Citations</h4>
        <div id="citations">
            <p>Source: Philippine Statistics Authority (PSA)</p>
            <p>OpenSTAT Portal • Last updated: 2023 Q4</p>
        </div>
    </footer>

    <script src="javascripts/stats.js"></script>
    <script src="javascripts/mallungay_pandesal.js"></script>
</body>
</html>
